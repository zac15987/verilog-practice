;; ============================================================
;; Quartus II 13.1 - VS Code Dark+ Theme (Text Editor Colors)
;; ============================================================
;; 使用方式：
;;   1. 關閉 Quartus II
;;   2. 找到你的 quartus2.qreg（通常在使用者家目錄下, windows 為 %USERPROFILE% 目錄下）
;;   3. 刪除原本所有 AFCQ_TED_*_COLOR 的行
;;   4. 把下面這些行貼到 [13.1] 區段的 Altera_Foundation_Class 區域
;;   5. 重新開啟 Quartus II
;;
;; 顏色對照表：
;;   Background        #1E1E1E  深灰黑背景
;;   Normal Text       #D4D4D4  淺灰文字
;;   Selection BG      #264F78  深藍選取背景
;;   Selection FG      #FFFFFF  白色選取文字
;;   Keywords          #569CD6  藍色 (Verilog/VHDL/Tcl keywords)
;;   SV Keywords       #4EC9B0  青綠 (SystemVerilog keywords)
;;   VHDL Std Pkg      #4EC9B0  青綠 (VHDL standard packages)
;;   Generic Keyword   #C586C0  紫粉 (control flow keywords)
;;   Strings           #CE9178  橘棕 (字串)
;;   Numbers           #B5CEA8  淺綠 (數字)
;;   Identifiers       #9CDCFE  亮藍 (識別字/變數)
;;   Comments          #6A9955  綠色 (單行/多行註解)
;;   Bookmark          #FFC800  黃色 (書籤標記)
;;   Tcl Modifier      #9CDCFE  亮藍
;;   Tcl Substitution  #9CDCFE  亮藍
;;   Add'l Selection   #333333  深灰
;;   Current Line BG   #282828  略亮深灰
;; ============================================================

